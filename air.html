<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#fff;
  color:#111;
}

header {
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  background:#fff;
  border-bottom:1px solid #eee;
}

.scene {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;

  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

.scene.active {
  opacity:1;
  transform:translateY(0);
}

img {
  width:100%;
  max-width:800px;
  border-radius:12px;
  margin-top:20px;
}
</style>
</head>

<body>

<header><a href="index.html">← Back</a></header>

<div class="scene active">
  <h1>AIR</h1>
  <p>Airflow as spatial structure</p>
</div>

<div class="scene">
  <p>Air defines movement-based spatial boundaries.</p>
</div>

<div class="scene">
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
</div>

<script>
const scenes = document.querySelectorAll(".scene");

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      scenes.forEach(s => s.classList.remove("active"));
      e.target.classList.add("active");
    }
  });
}, { threshold: 0.6 });

scenes.forEach(s => obs.observe(s));
</script>

</body>
</html>
