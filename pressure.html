<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressure</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#fff;
  color:#111;
}

header {
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  background:#fff;
  border-bottom:1px solid #eee;
  z-index:10;
}

.scene {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;

  opacity:0;
  transform:translateY(25px) scale(0.98);
  transition:all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.scene.active {
  opacity:1;
  transform:translateY(0) scale(1);
}

img {
  width:100%;
  max-width:800px;
  border-radius:12px;
  margin-top:20px;
}
</style>
</head>

<body>

<header><a href="index.html">← Back</a></header>

<div class="scene active">
  <h1>PRESSURE</h1>
  <p>Compression and spatial intensity</p>
</div>

<div class="scene">
  <p>Pressure defines space through resistance and release.</p>
</div>

<div class="scene">
  <img src="https://images.unsplash.com/photo-1529429612779-c8e40ef2f36d">
</div>

<script>
const scenes = document.querySelectorAll(".scene");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      scenes.forEach(s => s.classList.remove("active"));
      entry.target.classList.add("active");
    }
  });
}, {
  threshold: 0.3,
  rootMargin: "0px 0px -10% 0px"
});

scenes.forEach(s => observer.observe(s));
</script>

</body>
</html>
